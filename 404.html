<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | DK-HQ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .container { max-width: 480px; }
  .code {
    font-size: 6rem;
    font-weight: 900;
    background: linear-gradient(135deg, #00d2ff, #7b2ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 16px;
  }
  h1 { font-size: 1.4rem; color: #fff; margin-bottom: 12px; }
  p { color: #8892b0; font-size: 0.95rem; line-height: 1.6; margin-bottom: 28px; }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #0f3460, #16213e);
    border: 1px solid #1a3a6b;
    border-radius: 12px;
    color: #00d2ff;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.2s;
  }
  .back-btn:hover {
    background: linear-gradient(135deg, #1a4a80, #1e2d50);
    border-color: #00d2ff;
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0, 210, 255, 0.15);
  }
  .path {
    margin-top: 20px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.75rem;
    color: #4a5568;
    word-break: break-all;
  }
</style>
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you requested doesn't exist in DK-HQ. It may have been moved or the link is outdated.</p>
  <a class="back-btn" href="/">Back to Portal</a>
  <div class="path" id="path"></div>
</div>
<script>
  document.getElementById('path').textContent = window.location.pathname;
</script>
</body>
</html>
